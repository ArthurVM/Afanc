{% set version = "0.20" %}

package:
  name: afanc
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  skip: true  # [win]
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3.10,<3.13
    - biopython >=1.79
    - numpy >=1.20
    - openpyxl >=3.1
    - pandas >=1.3
    - pysam >=0.18
    - scipy >=1.7
    - bcftools
    - bedtools
    - blast
    - bowtie2
    - bwa
    - curl
    - entrez-direct
    - freebayes
    - kraken2
    - krona
    - mash
    - ncbi-datasets-cli
    - parallel
    - perl
    - rsync
    - samclip
    - samtools
    - unzip
    - wget

test:
  imports:
    - Afanc
    - Afanc.classifier
    - Afanc.classify
    - Afanc.screen.mapping
    - Afanc.screen.variant_profiler
  commands:
    - afanc --help
    - afanc classify --help
    - python -c "from Afanc.screen.mapping import build_mapping_pipeline_command, map_reads_to_bam, prepare_reference"
    - python -c "from Afanc.screen.variant_calling import run_variant_caller, run_bcftools_variant_caller, run_freebayes_variant_caller"
    - python -c "from Afanc.classifier.bayesian_profile import classify_snp_payload, run_lineage_classification"
    - python -c "import shutil, sys; tools=['bcftools','bedtools','blastn','bowtie2','bwa','curl','datasets','esearch','freebayes','freebayes-parallel','fasta_generate_regions.py','kraken2','ktImportTaxonomy','mash','parallel','samclip','samtools','wget']; missing=[tool for tool in tools if shutil.which(tool) is None]; sys.exit(1 if missing else 0)"

about:
  home: https://github.com/ArthurVM/Afanc
  summary: General purpose high-resolution metagenomics deconvolution.
  description: |
    Afanc provides dataset download, database construction, metagenomic screening,
    competitive mapping, legacy variant profiling, and the newer mapping and lineage
    classification components being developed in the codebase.
  license: GPL-3.0-only
  license_file: LICENSE
  dev_url: https://github.com/ArthurVM/Afanc
  doc_url: https://github.com/ArthurVM/Afanc

extra:
  recipe-maintainers:
    - ArthurVM
